# AWS and S3 configuration. Replace with your own values or environment variables when running.

# AWS region where your S3 bucket is located
aws.region=${AWS_REGION:us-east-1}

# The name of the S3 bucket to use for file uploads (must already exist)
aws.s3.bucket=${AWS_S3_BUCKET:your-bucket-name-here}

# These properties are set via environment variables or via your AWS CLI configuration.
# For AWS Academy or temporary credentials, set them as environment variables before starting the application.
aws.accessKeyId=${AWS_ACCESS_KEY_ID}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY}
aws.sessionToken=${AWS_SESSION_TOKEN}

# Server port can be customized
# server.port=8080

# Multipart upload limits (adjust according to your needs)
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}